<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#f8f9fa"/>
  
  <!-- 装饰性元素：段落线条 -->
  <g fill="#e9ecef">
    <rect x="200" y="400" width="800" height="6" rx="3"/>
    <rect x="200" y="440" width="600" height="6" rx="3"/>
    <rect x="200" y="480" width="400" height="6" rx="3"/>
  </g>
  
  <!-- 主标题，使用更强的字重和更大的尺寸 -->
  <text x="600" y="250" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="96" 
        font-weight="900" 
        text-anchor="middle" 
        fill="#212529">
    275<tspan fill="#ff3b30">0</tspan> w<tspan fill="#ff3b30">o</tspan>rds
  </text>
  
  <!-- 副标题使用更细的字重形成对比 -->
  <text x="600" y="320" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="32" 
        font-weight="300"
        letter-spacing="2"
        fill="#495057" 
        text-anchor="middle">
    一个法哲学研究者的博客
  </text>
  
  <!-- 装饰性数字，增加透明度对比 -->
  <g opacity="0.08" fill="#000">
    <text x="100" y="100" font-size="48" font-family="monospace" font-weight="bold">2750</text>
    <text x="1100" y="550" font-size="48" font-family="monospace" font-weight="bold">2750</text>
  </g>
</svg>